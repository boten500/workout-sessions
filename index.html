<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calisthenics Tracker Pro</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; --dark: #343a40; --info: #17a2b8; --grey: #6c757d; --warning: #ffc107; }
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f8f9fa; color: #333; padding-bottom: 100px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2, h3 { margin-top: 0; color: #111; }
        input, button, select { padding: 12px; margin: 5px 0; width: 100%; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-danger { background: var(--danger); font-size: 12px; padding: 8px; width: auto; margin: 0; }
        .btn-warning { background: var(--warning); color: #212529; font-size: 12px; padding: 8px; width: auto; }
        .btn-info { background: var(--info); font-size: 13px; padding: 6px; width: auto; margin: 5px 0; }
        .exercise-block { border-left: 4px solid var(--primary); padding-left: 10px; margin-bottom: 20px; }
        .set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .set-row span { min-width: 50px; font-weight: bold; font-size: 14px; }
        .video-container { width: 100%; aspect-ratio: 16/9; margin: 10px 0; display: none; }
        iframe { width: 100%; height: 100%; border-radius: 8px; border: none; }
        .template-tag-container { display: flex; align-items: center; background: #e9ecef; border-radius: 10px; padding: 4px 10px; margin: 4px; display: inline-flex; gap: 8px; }
        .template-tag { font-size: 12px; text-transform: uppercase; font-weight: bold; cursor: pointer; color: var(--dark); }
        .flex-group { display: flex; gap: 10px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

    <div id="setup-section">
        <h2>1. Templates</h2>
        <div class="card">
            <input type="text" id="tplName" placeholder="Session Name (e.g. OAPU Day)">
            <input type="text" id="tplExercises" placeholder="Ex1 [Link], Ex2, Ex3 [Link]">
            <button id="tplBtn" onclick="saveTemplate()">Create Template</button>
            <div id="templateList" style="margin-top:10px;"></div>
        </div>

        <h2>2. Workout</h2>
        <div class="card">
            <select id="tplSelect"><option value="">Choose Template...</option></select>
            <div class="flex-group">
                <button class="btn-outline" onclick="startSession()">Start</button>
                <button class="btn-info" onclick="filterHistoryByTemplate()">Filter History</button>
            </div>
            <button class="btn-grey" style="width:100%; margin-top:10px;" onclick="renderHistory()">Show All History</button>
        </div>
    </div>

    <div id="active-session" style="display:none;">
        <h2 id="currentSessionTitle"></h2>
        <div id="exerciseArea"></div>
        <button id="saveBtn" onclick="finishSession()" style="background: var(--success); margin-top: 20px;">Save Session</button>
        <button class="btn-outline" onclick="cancelSession()" style="margin-top:10px;">Discard</button>
    </div>

    <h2 id="historyHeader">History</h2>
    <div id="historyLog"></div>

    <div class="flex-group" style="margin-top: 30px;">
        <button class="btn-info" style="flex:1" onclick="exportData()">💾 Export</button>
        <button class="btn-info" style="flex:1" onclick="document.getElementById('fileInput').click()">📂 Import</button>
        <input type="file" id="fileInput" accept=".json" onchange="importData(event)">
    </div>

    <div class="danger-zone" style="margin-top:50px; border-top: 1px dashed #ccc; padding-top:20px;">
        <button class="btn-danger" style="width: 100%; opacity: 0.7;" onclick="clearFullCache()">Reset All Data</button>
    </div>

    <script>
        let templates = JSON.parse(localStorage.getItem('workoutTemplates')) || [];
        let history = JSON.parse(localStorage.getItem('workoutHistory')) || [];
        let activeSessionData = null;
        let isEditingWorkout = false;
        let editTemplateIdx = null;

        // CRITICAL FIX: Ensures old strings are treated as names
        function getExName(ex) {
            if (typeof ex === 'string') return ex;
            return ex.name || "Unknown Exercise";
        }

        function getExVideo(ex) {
            if (typeof ex === 'string') return null;
            return ex.video || null;
        }

        function formatVideoLink(link) {
            if (!link || typeof link !== 'string' || link.trim() === "") return null;
            link = link.trim();
            if (link.includes('drive.google.com')) {
                const idMatch = link.match(/\/d\/(.+?)\//) || link.match(/id=(.+?)(&|$)/);
                return idMatch ? `https://drive.google.com/embed?id=${idMatch[1]}` : link;
            }
            if (link.includes('youtube.com') || link.includes('youtu.be')) {
                const id = link.split('v=')[1]?.split('&')[0] || link.split('/').pop().split('?')[0];
                return `https://www.youtube.com/embed/${id}`;
            }
            return link;
        }

        function saveTemplate() {
            const nameInput = document.getElementById('tplName').value.trim();
            const exStr = document.getElementById('tplExercises').value.trim();
            if (!nameInput || !exStr) return;
            
            const rawItems = exStr.split(/,(?![^\[]*\])/);
            const exArray = rawItems.map(item => {
                const bracketIndex = item.indexOf('[');
                if (bracketIndex !== -1) {
                    const name = item.substring(0, bracketIndex).trim();
                    const link = item.substring(bracketIndex + 1, item.lastIndexOf(']')).trim();
                    return { name: name || "Exercise", video: formatVideoLink(link) };
                }
                return { name: item.trim() || "Exercise", video: null };
            }).filter(ex => ex.name !== "");

            if (editTemplateIdx !== null) {
                templates[editTemplateIdx] = { name: nameInput, exercises: exArray };
                editTemplateIdx = null;
            } else {
                templates.push({ name: nameInput, exercises: exArray });
            }
            
            localStorage.setItem('workoutTemplates', JSON.stringify(templates));
            location.reload();
        }

        function renderTemplates() {
            const select = document.getElementById('tplSelect');
            const list = document.getElementById('templateList');
            templates.forEach((t, i) => {
                list.innerHTML += `
                    <div class="template-tag-container">
                        <span class="template-tag" onclick="editTemplate(${i})">${t.name}</span>
                        <span style="color:var(--danger); font-weight:bold; cursor:pointer; padding: 0 5px;" onclick="deleteTemplate(${i})">✕</span>
                    </div>`;
                select.innerHTML += `<option value="${t.name}">${t.name}</option>`;
            });
        }

        function startSession() {
            const sel = document.getElementById('tplSelect').value;
            if (!sel) return;
            const tpl = templates.find(t => t.name === sel);
            isEditingWorkout = false;
            activeSessionData = { 
                id: Date.now(), name: tpl.name, date: new Date().toLocaleDateString('en-GB'),
                exercises: tpl.exercises.map(ex => ({ 
                    name: getExName(ex), 
                    video: getExVideo(ex), 
                    sets: [] 
                })) 
            };
            showUI(tpl.name);
        }

        function renderActive() {
            const area = document.getElementById('exerciseArea');
            area.innerHTML = activeSessionData.exercises.map((ex, exIdx) => `
                <div class="exercise-block">
                    <h3>* ${ex.name}</h3>
                    ${ex.video ? `<button class="btn-info" onclick="toggleVideo('vid-${exIdx}')">📺 Watch Form</button>
                    <div id="vid-${exIdx}" class="video-container"><iframe src="${ex.video}" allowfullscreen></iframe></div>` : ''}
                    <div id="sets-${exIdx}">
                        ${ex.sets.map((v, sIdx) => `
                            <div class="set-row">
                                <span>Set ${sIdx + 1}:</span>
                                <input type="text" value="${v}" onchange="updateSet(${exIdx}, ${sIdx}, this.value)">
                                <button class="btn-danger" onclick="removeSet(${exIdx}, ${sIdx})">✕</button>
                            </div>`).join('')}
                    </div>
                    <button class="btn-outline" style="width:auto; padding:5px 15px;" onclick="addSet(${exIdx})">+ Set</button>
                </div>`).join('');
        }

        function renderHistory(data = history) {
            const log = document.getElementById('historyLog');
            log.innerHTML = data.map(s => `
                <div class="card history-item">
                    <div style="display:flex; justify-content:space-between;">
                        <div><small>${s.date}</small><br><strong>${s.name}</strong></div>
                        <div class="flex-group">
                            <button class="btn-warning" onclick="editSession(${s.id})">Edit</button>
                            <button class="btn-danger" onclick="deleteSession(${s.id})">Delete</button>
                        </div>
                    </div>
                    ${s.exercises.map(ex => `
                        <div style="margin-top:8px;"><strong>* ${getExName(ex)}</strong>
                            ${ex.sets.map((r, i) => `<div style="font-size:13px; margin-left:12px;">- Set ${i+1}: ${r}</div>`).join('')}
                        </div>`).join('')}
                </div>`).join('');
        }

        function addSet(i) { activeSessionData.exercises[i].sets.push(""); renderActive(); }
        function removeSet(i, s) { activeSessionData.exercises[i].sets.splice(s, 1); renderActive(); }
        function updateSet(i, s, v) { activeSessionData.exercises[i].sets[s] = v; }
        function finishSession() {
            if (isEditingWorkout) {
                const i = history.findIndex(s => s.id === activeSessionData.id);
                if (i !== -1) history[i] = activeSessionData;
            } else { history.unshift(activeSessionData); }
            localStorage.setItem('workoutHistory', JSON.stringify(history));
            location.reload();
        }
        function editSession(id) {
            isEditingWorkout = true;
            activeSessionData = JSON.parse(JSON.stringify(history.find(s => s.id === id)));
            showUI(`Edit: ${activeSessionData.name}`);
            document.getElementById('saveBtn').innerText = "Update Record";
        }
        function showUI(title) {
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('active-session').style.display = 'block';
            document.getElementById('currentSessionTitle').innerText = title;
            renderActive();
        }
        function toggleVideo(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }
        function deleteTemplate(idx) { if(confirm("Delete?")) { templates.splice(idx, 1); localStorage.setItem('workoutTemplates', JSON.stringify(templates)); location.reload(); } }
        function editTemplate(idx) {
            const t = templates[idx];
            document.getElementById('tplName').value = t.name;
            document.getElementById('tplExercises').value = t.exercises.map(ex => {
                const name = getExName(ex);
                const vid = getExVideo(ex);
                return name + (vid ? ` [${vid}]` : "");
            }).join(', ');
            editTemplateIdx = idx;
            document.getElementById('tplBtn').innerText = "Update Template";
            window.scrollTo(0,0);
        }
        function deleteSession(id) { if(confirm("Delete?")) { history = history.filter(s => s.id !== id); localStorage.setItem('workoutHistory', JSON.stringify(history)); location.reload(); }}
        function filterHistoryByTemplate() { renderHistory(history.filter(s => s.name === document.getElementById('tplSelect').value)); }
        function exportData() { const blob = new Blob([JSON.stringify({ templates, history })], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'backup.json'; a.click(); }
        function importData(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const d = JSON.parse(f.target.result);
                localStorage.setItem('workoutTemplates', JSON.stringify(d.templates));
                localStorage.setItem('workoutHistory', JSON.stringify(d.history));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
        function clearFullCache() { if(confirm("Wipe all?")) { localStorage.clear(); location.reload(); } }
        function cancelSession() { location.reload(); }
        renderTemplates();
        renderHistory();
    </script>
</body>
</html>
